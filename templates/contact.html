{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="premium-card animate-slide-up">
                <div class="card-body p-5">
                    <div class="text-center mb-5">
                        <i class="fas fa-envelope-open-text fa-3x text-primary mb-3"></i>
                        <h2 class="text-primary fw-bold text-gradient">Contact Platform Admins</h2>
                        <p class="text-secondary mt-2">Have a question or technical issue with our analytics engine? Drop us a message.</p>
                    </div>

                    <form action="{{ url_for('contact') }}" method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" required placeholder="John Doe">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="name@example.com">
                        </div>
                        <div class="mb-4">
                            <label for="message" class="form-label fw-bold">Message</label>
                            <textarea class="form-control" id="message" name="message" rows="5" required placeholder="How can we help?"></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill p-3 mt-2 shadow-sm">Send Message</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
